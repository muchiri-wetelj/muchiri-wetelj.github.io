<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Martin Muchiri</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23111009'/><circle cx='16' cy='16' r='6' fill='none' stroke='%23D4923A' stroke-width='1.5'/><line x1='16' y1='4' x2='16' y2='10' stroke='%23D4923A' stroke-width='1.5'/><line x1='16' y1='22' x2='16' y2='28' stroke='%23D4923A' stroke-width='1.5'/><line x1='4' y1='16' x2='10' y2='16' stroke='%23D4923A' stroke-width='1.5'/><line x1='22' y1='16' x2='28' y2='16' stroke='%23D4923A' stroke-width='1.5'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200;1,9..144,300;1,9..144,400&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0A0906;--text:#EDE7DB;--muted:rgba(237,231,219,.52);--faint:rgba(237,231,219,.28);--amber:#E0A040;--amber-d:rgba(224,160,64,.35);--serif:'Fraunces',Georgia,serif;--mono:'Space Mono',monospace;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased;}
    ::selection{background:rgba(224,160,64,.3);color:var(--text);}
    .slides{position:fixed;inset:0;z-index:0;}
    .slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2s ease;}
    .slide.active{opacity:1;}
    .slide.video-slide{background:#000;}
    .slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,7,5,.68) 0%,rgba(8,7,5,0) 28%,rgba(8,7,5,0) 52%,rgba(8,7,5,.5) 72%,rgba(8,7,5,.9) 100%);}
    .video-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
    .video-wrap iframe{position:absolute;width:177.78%;height:177.78%;top:-38.89%;left:-38.89%;border:none;}
    nav{position:fixed;top:0;left:0;right:0;z-index:20;padding:1.75rem 2.5rem;display:flex;justify-content:space-between;align-items:center;}
    .nav-name{font-family:var(--serif);font-weight:300;font-size:.88rem;color:var(--text);text-decoration:none;opacity:.85;transition:opacity .2s;}
    .nav-name:hover{opacity:1;}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links a{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
    .nav-links a:hover{color:var(--text);}
    .bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:0 2.5rem 2.25rem;}
    .quote-wrap{max-width:680px;margin-bottom:1.5rem;opacity:0;transform:translateY(8px);transition:opacity .9s ease .4s,transform .9s ease .4s;}
    .quote-wrap.visible{opacity:1;transform:translateY(0);}
    .quote-text{font-family:var(--serif);font-weight:200;font-style:italic;font-size:clamp(1.25rem,2.8vw,1.8rem);line-height:1.4;color:var(--text);letter-spacing:-.01em;margin-bottom:.55rem;}
    .quote-attr{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .bottom-bar{display:flex;justify-content:space-between;align-items:flex-end;}
    .species-info{opacity:0;transform:translateY(4px);transition:opacity .7s ease .7s,transform .7s ease .7s;}
    .species-info.visible{opacity:1;transform:translateY(0);}
    .species-name{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:.12rem;}
    .species-loc{font-size:.58rem;letter-spacing:.06em;color:var(--faint);}
    .controls{display:flex;flex-direction:column;align-items:flex-end;gap:.7rem;}
    .slide-counter{font-size:.55rem;letter-spacing:.1em;color:var(--faint);}
    .progress-track{width:110px;height:1px;background:rgba(237,231,219,.15);position:relative;}
    .progress-fill{position:absolute;top:0;left:0;bottom:0;background:var(--amber);transition:width .1s linear;}
    .nav-arrows{display:flex;gap:.6rem;}
    .arrow-btn{background:none;border:1px solid rgba(237,231,219,.18);color:var(--muted);font-family:var(--mono);font-size:.62rem;padding:.28rem .55rem;cursor:pointer;transition:border-color .2s,color .2s;}
    .arrow-btn:hover{border-color:rgba(237,231,219,.45);color:var(--text);}
    .apod-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);background:rgba(224,160,64,.1);border:1px solid var(--amber-d);padding:.2rem .6rem;margin-bottom:.5rem;}
    #music-player{position:fixed;bottom:2.25rem;right:2.5rem;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;}
    .player-toggle{background:rgba(10,9,6,.85);backdrop-filter:blur(10px);border:1px solid rgba(237,231,219,.15);color:var(--muted);font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.5rem .85rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:color .2s,border-color .2s;}
    .player-toggle:hover{color:var(--amber);border-color:var(--amber-d);}
    .player-toggle .dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s;}
    .player-toggle .dot.playing{background:var(--amber);animation:pulse 1.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .player-panel{background:rgba(10,9,6,.9);backdrop-filter:blur(12px);border:1px solid rgba(237,231,219,.12);overflow:hidden;width:300px;display:none;}
    .player-panel.open{display:block;}
    .player-tabs{display:flex;border-bottom:1px solid rgba(237,231,219,.1);}
    .p-tab{flex:1;font-family:var(--mono);font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:.5rem;cursor:pointer;text-align:center;border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
    .p-tab:hover{color:var(--muted);}
    .p-tab.active{color:var(--amber);border-bottom-color:var(--amber);}
    .p-panel{display:none;}
    .p-panel.active{display:block;}
    .spotify-wrap iframe{display:block;}
    .player-note{padding:.6rem .75rem;font-size:.55rem;color:var(--faint);font-family:var(--mono);line-height:1.5;border-top:1px solid rgba(237,231,219,.08);}
    @media(max-width:580px){nav{padding:1.25rem;}.bottom{padding:0 1.25rem 1.5rem;}.nav-links{gap:1.25rem;}#music-player{right:1.25rem;bottom:1.5rem;}.player-panel{width:260px;}}
  </style>
</head>
<body>
  <div class="slides" id="slides"></div>
  <nav>
    <a href="index.html" class="nav-name">Martin Muchiri</a>
    <ul class="nav-links">

  <div class="bottom">
    <div class="quote-wrap" id="quoteWrap">
      <p class="apod-badge" id="apodBadge" style="display:none;">✦ NASA · Astronomy Picture of the Day</p>
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-attr" id="quoteAttr"></p>
    </div>
    <div class="bottom-bar">
      <div class="species-info" id="speciesInfo">
        <p class="species-name" id="speciesName"></p>
        <p class="species-loc" id="speciesLoc"></p>
      </div>
      <div class="controls">
        <span class="slide-counter" id="counter">01 / 32</span>
        <div class="progress-track"><div class="progress-fill" id="fill"></div></div>
        <div class="nav-arrows">
          <button class="arrow-btn" id="prevBtn">← prev</button>
          <button class="arrow-btn" id="nextBtn">next →</button>
        </div>
      </div>
    </div>
  </div>
  <div id="music-player">
    <div class="player-panel" id="playerPanel">
      <div class="player-tabs">
        <div class="p-tab active" onclick="switchPTab(this,'piano')">Piano</div>
        <div class="p-tab" onclick="switchPTab(this,'africa')">Africa</div>
        <div class="p-tab" onclick="switchPTab(this,'focus')">Focus</div>
        <div class="p-tab" onclick="switchPTab(this,'ambient')">Ambient</div>
      </div>
      <div class="p-panel active" id="ptab-piano">
        <div class="spotify-wrap"><iframe style="border-radius:0" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX3Ogo9pFvBkY?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>
      </div>
      <div class="p-panel" id="ptab-africa">
        <div class="spotify-wrap"><iframe style="border-radius:0" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8bXByKnhSmh?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>
      </div>
      <div class="p-panel" id="ptab-focus">
        <div class="spotify-wrap"><iframe style="border-radius:0" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWXLeA8Omikj7?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>
      </div>
      <div class="p-panel" id="ptab-ambient">
        <div class="spotify-wrap"><iframe style="border-radius:0" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX6GwdWRQMQpq?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>
      </div>
      <p class="player-note">Spotify users: full playback. Others: 30-sec previews.</p>
    </div>
    <button class="player-toggle" id="playerToggle" onclick="togglePlayer()">
      <span class="dot" id="playerDot"></span>listen
    </button>
  </div>
  <script>
  const photoSlides=[
    {img:'https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?auto=format&fit=crop&w=1920&q=80',quote:'A tree that grows in the shade of another will die small.',attr:'— Tanzanian proverb',name:'Vachellia tortilis · Umbrella Acacia',loc:'Maasai Mara, Kenya'},
    {img:'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?auto=format&fit=crop&w=1920&q=80',quote:'The birds do not inherit the air. They earn it, every morning.',attr:'— Anonymous',name:'Phoeniconaias minor · Lesser Flamingo',loc:'Lake Nakuru, Kenya'},
    {img:'https://images.unsplash.com/photo-1581852017103-68ac65514cf7?auto=format&fit=crop&w=1920&q=80',quote:'Until the lion learns to write, every story will glorify the hunter.',attr:'— Igbo proverb',name:'Loxodonta africana · African Elephant',loc:'Amboseli, Kenya'},
    {img:'https://images.unsplash.com/photo-1551632811-561732d1e306?auto=format&fit=crop&w=1920&q=80',quote:'The earth does not belong to us. We belong to the earth.',attr:'— Chief Seattle',name:'Cenchrus ciliaris · Buffel Grass',loc:'Tsavo East, Kenya'},
    {img:'https://images.unsplash.com/photo-1547970810-dc1eac37d174?auto=format&fit=crop&w=1920&q=80',quote:'Not all those who wander are lost.',attr:'— J.R.R. Tolkien',name:'Giraffa reticulata · Reticulated Giraffe',loc:'Laikipia, Kenya'},
    {img:'https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1920&q=80',quote:'The older the tree, the deeper the root.',attr:'— African proverb',name:'Adansonia digitata · Baobab',loc:'Kilifi Coast, Kenya'},
    {img:'https://images.unsplash.com/photo-1535941339077-2dd1c7963098?auto=format&fit=crop&w=1920&q=80',quote:'Water does not ask where it is going. It trusts the river to know.',attr:'— After Lao Tzu',name:'Connochaetes taurinus · Blue Wildebeest',loc:'Mara River, Kenya'},
    {img:'https://picsum.photos/id/15/1920/1080',quote:'To name a thing is to begin to know it.',attr:'— Toni Morrison',name:'',loc:''},
    {img:'https://picsum.photos/id/28/1920/1080',quote:'The mountains are calling and I must go.',attr:'— John Muir',name:'',loc:''},
    {img:'https://picsum.photos/id/37/1920/1080',quote:'Wilderness is not a luxury but a necessity of the human spirit.',attr:'— Edward Abbey',name:'',loc:''},
    {img:'https://picsum.photos/id/63/1920/1080',quote:'In every walk with nature, one receives far more than he seeks.',attr:'— John Muir',name:'',loc:''},
    {img:'https://picsum.photos/id/98/1920/1080',quote:'What you are is what you have been. What you will be is what you do now.',attr:'— Buddha',name:'',loc:''},
    {img:'https://picsum.photos/id/110/1920/1080',quote:'I am not afraid of storms, for I am learning how to sail my ship.',attr:'— Louisa May Alcott',name:'',loc:''},
    {img:'https://picsum.photos/id/127/1920/1080',quote:'A child who is not embraced by the village will burn it down to feel its warmth.',attr:'— African proverb',name:'',loc:''},
    {img:'https://picsum.photos/id/188/1920/1080',quote:'The function of education is to teach one to think intensively and to think critically.',attr:'— Martin Luther King Jr.',name:'',loc:''},
    {img:'https://picsum.photos/id/213/1920/1080',quote:'Technology is neither good nor bad; nor is it neutral.',attr:'— Melvin Kranzberg',name:'',loc:''},
    {img:'https://picsum.photos/id/334/1920/1080',quote:'I am because we are.',attr:'— Ubuntu philosophy',name:'',loc:''},
    {img:'https://picsum.photos/id/355/1920/1080',quote:'Injustice anywhere is a threat to justice everywhere.',attr:'— Martin Luther King Jr.',name:'',loc:''},
    {img:'https://picsum.photos/id/396/1920/1080',quote:'The opposite of poverty is not wealth. The opposite of poverty is justice.',attr:'— Bryan Stevenson',name:'',loc:''},
    {img:'https://picsum.photos/id/431/1920/1080',quote:'To educate a woman is to educate a nation.',attr:'— African proverb',name:'',loc:''},
    {img:'https://picsum.photos/id/447/1920/1080',quote:'I write because I do not know what I think until I read what I say.',attr:'— Flannery O\'Connor',name:'',loc:''},
    {img:'https://picsum.photos/id/503/1920/1080',quote:'Knowledge is like a garden: if it is not cultivated, it cannot be harvested.',attr:'— African proverb',name:'',loc:''},
    {img:'https://picsum.photos/id/534/1920/1080',quote:'The world always seems brighter when you have just made something that was not there before.',attr:'— Neil Gaiman',name:'',loc:''},
    {img:'https://picsum.photos/id/570/1920/1080',quote:'What we observe is not nature itself, but nature exposed to our method of questioning.',attr:'— Werner Heisenberg',name:'',loc:''},
    {img:'https://picsum.photos/id/618/1920/1080',quote:'The test of progress is whether we provide enough for those who have little.',attr:'— Franklin D. Roosevelt',name:'',loc:''},
    {img:'https://picsum.photos/id/683/1920/1080',quote:'Language is a skin: I rub my language against the other.',attr:'— Roland Barthes',name:'',loc:''},
    {img:'https://picsum.photos/id/718/1920/1080',quote:'The most common way people give up their power is by thinking they do not have any.',attr:'— Alice Walker',name:'',loc:''},
    {img:'https://picsum.photos/id/760/1920/1080',quote:'Until you make the unconscious conscious, it will direct your life and you will call it fate.',attr:'— C.G. Jung',name:'',loc:''},
    {img:'https://picsum.photos/id/833/1920/1080',quote:'We are what we repeatedly do.',attr:'— Aristotle',name:'',loc:''},
    {img:'https://picsum.photos/id/488/1920/1080',quote:'The world is not a problem to be solved; it is a living being to which we belong.',attr:'— Llewelyn Vaughan-Lee',name:'',loc:''},
  ];
  // VIDEO SLIDES — replace videoId values with any YouTube IDs you like
  // Good search: "4K African wildlife ambient relaxing" on YouTube
  const videoSlides=[
    {isVideo:true,videoId:'Gu2rEp_SZSg',quote:'Look deep into nature, and then you will understand everything better.',attr:'— Albert Einstein',name:'Video — replace ID in index.html',loc:''},
    {isVideo:true,videoId:'mF8wmpGaUP8',quote:'The silence of nature is very real. It surrounds you, you can feel it.',attr:'— Ted Trueblood',name:'Video — replace ID in index.html',loc:''},
  ];
  let slides=[...photoSlides];
  slides.splice(10,0,videoSlides[0]);
  slides.splice(22,0,videoSlides[1]);
  const slidesEl=document.getElementById('slides');
  function buildSlides(){
    slidesEl.innerHTML='';
    slides.forEach((s,i)=>{
      const el=document.createElement('div');
      el.className='slide'+(s.isVideo?' video-slide':'')+(i===0?' active':'');
      if(s.isVideo){
        el.innerHTML=`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${s.videoId}?autoplay=1&mute=1&loop=1&playlist=${s.videoId}&controls=0&showinfo=0&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>`;
      }else{
        el.style.backgroundImage=`url('${s.img}')`;
      }
      slidesEl.appendChild(el);
    });
  }
  buildSlides();
  let cur=0,timer=null,progress=0,paused=false;
  const DUR=9500,TICK=100;
  function showSlide(n){
    const els=document.querySelectorAll('.slide');
    els[cur].classList.remove('active');
    document.getElementById('quoteWrap').classList.remove('visible');
    document.getElementById('speciesInfo').classList.remove('visible');
    cur=(n+slides.length)%slides.length;
    els[cur].classList.add('active');
    const s=slides[cur];
    setTimeout(()=>{
      document.getElementById('quoteText').textContent=s.quote;
      document.getElementById('quoteAttr').textContent=s.attr;
      document.getElementById('speciesName').textContent=s.name;
      document.getElementById('speciesLoc').textContent=s.loc;
      document.getElementById('apodBadge').style.display=s.isAPOD?'inline-flex':'none';
      document.getElementById('quoteWrap').classList.add('visible');
      document.getElementById('speciesInfo').classList.add('visible');
    },500);
    document.getElementById('counter').textContent=String(cur+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
    progress=0;document.getElementById('fill').style.width='0%';
  }
  function tick(){if(paused)return;progress+=TICK;document.getElementById('fill').style.width=Math.min((progress/DUR)*100,100)+'%';if(progress>=DUR)showSlide(cur+1);}
  function startTimer(){clearInterval(timer);timer=setInterval(tick,TICK);}
  document.getElementById('nextBtn').onclick=()=>{showSlide(cur+1);startTimer();};
  document.getElementById('prevBtn').onclick=()=>{showSlide(cur-1);startTimer();};
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){showSlide(cur+1);startTimer();}if(e.key==='ArrowLeft'){showSlide(cur-1);startTimer();}});
  document.querySelector('.bottom').addEventListener('mouseenter',()=>{paused=true;});
  document.querySelector('.bottom').addEventListener('mouseleave',()=>{paused=false;});
  showSlide(0);startTimer();
  async function fetchAPOD(){try{const r=await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');const d=await r.json();if(d.media_type==='image'){slides.unshift({img:d.hdurl||d.url,quote:d.title,attr:'— NASA APOD · '+d.date,name:d.copyright?'© '+d.copyright:'NASA / APOD',loc:'Astronomy Picture of the Day',isAPOD:true});buildSlides();showSlide(0);startTimer();}}catch(e){}}
  fetchAPOD();
  function togglePlayer(){const p=document.getElementById('playerPanel'),d=document.getElementById('playerDot');p.classList.toggle('open');d.classList.toggle('playing',p.classList.contains('open'));}
  function switchPTab(el,id){document.querySelectorAll('.p-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.p-panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('ptab-'+id).classList.add('active');}
  </script>
</body>
